<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 96 96" width="96" height="96">
  <!-- Talle Furniture Mart — favicon / app icon.
       Just the chair mark, square aspect ratio, optimised for 16-512 px. -->

  <!-- Charcoal rounded square -->
  <rect x="0" y="0" width="96" height="96" rx="16" fill="#111827"/>

  <!-- Single-line chair drawing in white -->
  <g fill="none" stroke="#ffffff" stroke-width="6" stroke-linecap="square" stroke-linejoin="miter">
    <line x1="34" y1="24" x2="34" y2="68"/>
    <line x1="34" y1="58" x2="64" y2="58"/>
    <line x1="64" y1="58" x2="64" y2="76"/>
  </g>
  <!-- Red accent dot -->
  <circle cx="34" cy="20" r="4" fill="#e53935"/>
</svg>
