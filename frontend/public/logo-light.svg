<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 360 96" width="360" height="96">
  <!-- Talle Furniture Mart — light variant (white wordmark on dark bg).
       Same architecture as /logo.svg but inverted for footer / dark
       gradient panels (Login/Register left side, ForgotPassword and
       ResetPassword header band). The mark itself stays a charcoal
       square — charcoal reads cleanly on every brand background and
       keeps the visual identity consistent across both variants. -->

  <!-- Mark: rounded charcoal square — same as primary -->
  <rect x="6" y="6" width="84" height="84" rx="12" fill="#111827"/>

  <!-- Single-line chair drawing in white -->
  <g fill="none" stroke="#ffffff" stroke-width="5" stroke-linecap="square" stroke-linejoin="miter">
    <line x1="36" y1="24" x2="36" y2="64"/>
    <line x1="36" y1="56" x2="62" y2="56"/>
    <line x1="62" y1="56" x2="62" y2="72"/>
  </g>
  <!-- Red accent dot — slightly brighter so it still pops on red/pink bg -->
  <circle cx="36" cy="20" r="3.5" fill="#ffffff"/>

  <!-- TALLE wordmark — white -->
  <text x="108" y="50"
        font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
        font-size="34"
        font-weight="800"
        letter-spacing="4"
        fill="#ffffff">TALLE</text>

  <!-- FURNITURE MART rule + sub-line in white / soft grey -->
  <line x1="110" y1="60" x2="222" y2="60" stroke="#ffffff" stroke-width="1.5"/>
  <text x="110" y="78"
        font-family="'Poppins', 'Helvetica Neue', Arial, sans-serif"
        font-size="10"
        font-weight="600"
        letter-spacing="5"
        fill="#ffffff" opacity="0.85">FURNITURE MART</text>
</svg>
