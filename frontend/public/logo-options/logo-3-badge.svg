<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 340 100" width="340" height="100">
  <!-- Option 3: Round workshop badge + wordmark
       Primary use: artisan / heritage feel. Matches the "real
       craftsman shop" pitch the about-page tells. Good for invoices
       and shipping labels — feels stamped, not corporate. -->

  <!-- Outer red ring -->
  <circle cx="50" cy="50" r="44" fill="none" stroke="#e53935" stroke-width="3"/>
  <!-- Inner thin ring -->
  <circle cx="50" cy="50" r="36" fill="none" stroke="#e53935" stroke-width="1"/>

  <!-- Big T monogram centred -->
  <text x="50" y="62"
        text-anchor="middle"
        font-family="'Playfair Display', Georgia, serif"
        font-size="44"
        font-weight="900"
        fill="#e53935">T</text>

  <!-- Curved text along the top of the ring -->
  <defs>
    <path id="badge-top" d="M 14 50 A 36 36 0 0 1 86 50" fill="none"/>
    <path id="badge-bottom" d="M 14 50 A 36 36 0 0 0 86 50" fill="none"/>
  </defs>
  <text font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="6.5"
        font-weight="700"
        letter-spacing="2.5"
        fill="#111827">
    <textPath href="#badge-top" startOffset="50%" text-anchor="middle">
      FURNITURE MART
    </textPath>
  </text>
  <text font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="6"
        font-weight="600"
        letter-spacing="2"
        fill="#6b7280">
    <textPath href="#badge-bottom" startOffset="50%" text-anchor="middle">
      EST. 2010 · MUMBAI
    </textPath>
  </text>

  <!-- Wordmark to the right of the badge -->
  <text x="112" y="56"
        font-family="'Playfair Display', Georgia, serif"
        font-size="36"
        font-weight="900"
        letter-spacing="1"
        fill="#111827">Talle</text>

  <!-- Sub-line under the wordmark -->
  <text x="114" y="76"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="10"
        font-weight="700"
        letter-spacing="4"
        fill="#e53935">FURNITURE MART</text>

  <!-- Decorative star between rings, very subtle -->
  <circle cx="50" cy="20" r="1.5" fill="#e53935"/>
  <circle cx="50" cy="80" r="1.5" fill="#e53935"/>
  <circle cx="20" cy="50" r="1.5" fill="#e53935"/>
  <circle cx="80" cy="50" r="1.5" fill="#e53935"/>
</svg>
