<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 320 80" width="320" height="80">
  <!-- Option 1: Chair icon + horizontal wordmark
       Primary use: navbar, header, marketing email banners.
       Crisp at every size, no raster artefacts on retina. -->

  <!-- Chair silhouette in a rounded red square -->
  <rect x="4" y="4" width="72" height="72" rx="14" fill="#e53935"/>
  <!-- Stylised executive chair: back, seat, base, hydraulic stem -->
  <g fill="#ffffff" stroke="none">
    <!-- Chair back (tall rectangle with rounded top) -->
    <rect x="28" y="16" width="24" height="28" rx="4"/>
    <!-- Chair seat -->
    <rect x="22" y="42" width="36" height="6" rx="2"/>
    <!-- Hydraulic stem -->
    <rect x="38" y="48" width="4" height="10"/>
    <!-- 5-star base spokes -->
    <path d="M22 64 L40 56 L58 64 L52 66 L40 60 L28 66 Z"/>
    <!-- Castor wheels -->
    <circle cx="22" cy="64" r="2.5"/>
    <circle cx="58" cy="64" r="2.5"/>
    <circle cx="40" cy="66" r="2.5"/>
  </g>

  <!-- TALLE wordmark in red -->
  <text x="88" y="42"
        font-family="'Playfair Display', Georgia, serif"
        font-size="36"
        font-weight="800"
        letter-spacing="1"
        fill="#e53935">TALLE</text>

  <!-- FURNITURE MART subtitle in gray -->
  <text x="88" y="62"
        font-family="'Poppins', 'Helvetica Neue', sans-serif"
        font-size="11"
        font-weight="700"
        letter-spacing="4"
        fill="#374151">FURNITURE MART</text>
</svg>
